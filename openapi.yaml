openapi: 3.0.3
info:
  title: Nexus Logistics API
  description: |
    REST API for enterprise freight operations — shipments, quotes, tracking, warehouses, and customs documentation.

    Authentication: use Authorization Bearer token from /auth/token, or X-API-Key for server-to-server integrations.

    Idempotency: POST endpoints that create resources accept optional header Idempotency-Key (UUID) to safely retry requests.
  version: 1.0.0
  contact:
    name: Nexus Logistics API Support
    email: api-support@nexuslogistics.example.com
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000/v1
    description: Local development

tags:
  - name: Auth
    description: OAuth2 client credentials and API keys
  - name: Shipments
    description: Create and manage freight shipments
  - name: Tracking
    description: Real-time shipment visibility
  - name: Quotes
    description: Rate quotes and booking
  - name: Warehouses
    description: Hubs, cross-dock, and inventory nodes
  - name: Documents
    description: Bills of lading, customs, and proofs of delivery
  - name: Webhooks
    description: Event subscriptions

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  /health:
    get:
      tags: [Auth]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/token:
    post:
      tags: [Auth]
      summary: Obtain access token
      operationId: createToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shipments:
    get:
      tags: [Shipments]
      summary: List shipments
      operationId: listShipments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ShipmentStatus'
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
        - name: createdAfter
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated shipment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shipments]
      summary: Create shipment
      operationId: createShipment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
            examples:
              airFreight:
                summary: Air freight example
                value:
                  serviceLevel: EXPRESS
                  mode: AIR
                  reference: PO-88421
                  shipper:
                    name: Acme Manufacturing
                    address:
                      line1: 1200 Industrial Blvd
                      city: Shanghai
                      postalCode: '200120'
                      countryCode: CN
                  consignee:
                    name: Globex EU BV
                    address:
                      line1: Wilhelminakade 909
                      city: Rotterdam
                      postalCode: '3072 AP'
                      countryCode: NL
                  packages:
                    - weightKg: 420
                      lengthCm: 120
                      widthCm: 80
                      heightCm: 90
                      quantity: 2
                      description: Industrial valves
      responses:
        '201':
          description: Shipment created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /shipments/{shipmentId}:
    get:
      tags: [Shipments]
      summary: Get shipment by ID
      operationId: getShipment
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Shipment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Shipments]
      summary: Update shipment
      operationId: updateShipment
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShipmentRequest'
      responses:
        '200':
          description: Shipment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '404':
          $ref: '#/components/responses/NotFound'

  /shipments/{shipmentId}/cancel:
    post:
      tags: [Shipments]
      summary: Cancel shipment
      operationId: cancelShipment
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Shipment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '409':
          description: Shipment cannot be cancelled in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tracking/{trackingNumber}:
    get:
      tags: [Tracking]
      summary: Track by public tracking number
      operationId: trackShipment
      security: []
      parameters:
        - name: trackingNumber
          in: path
          required: true
          schema:
            type: string
            pattern: '^NX-[A-Z0-9]{7,12}$'
            example: NX-4829103
      responses:
        '200':
          description: Tracking timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /shipments/{shipmentId}/events:
    get:
      tags: [Tracking]
      summary: List shipment events
      operationId: listShipmentEvents
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Event history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrackingEvent'

  /quotes:
    post:
      tags: [Quotes]
      summary: Request freight quote
      operationId: createQuote
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Quote options returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /quotes/{quoteId}/book:
    post:
      tags: [Quotes]
      summary: Book a quoted lane
      operationId: bookQuote
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [optionId]
              properties:
                optionId:
                  type: string
                reference:
                  type: string
      responses:
        '201':
          description: Shipment created from quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'

  /warehouses:
    get:
      tags: [Warehouses]
      summary: List warehouse hubs
      operationId: listWarehouses
      parameters:
        - name: countryCode
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
      responses:
        '200':
          description: Warehouse list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Warehouse'

  /warehouses/{warehouseId}:
    get:
      tags: [Warehouses]
      summary: Get warehouse details
      operationId: getWarehouse
      parameters:
        - name: warehouseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Warehouse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'

  /shipments/{shipmentId}/documents:
    get:
      tags: [Documents]
      summary: List shipment documents
      operationId: listDocuments
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Document metadata list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Document'
    post:
      tags: [Documents]
      summary: Upload document
      operationId: uploadDocument
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, type]
              properties:
                file:
                  type: string
                  format: binary
                type:
                  $ref: '#/components/schemas/DocumentType'
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /documents/{documentId}:
    get:
      tags: [Documents]
      summary: Download document
      operationId: downloadDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      operationId: listWebhooks
      responses:
        '200':
          description: Webhook list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Webhook'
    post:
      tags: [Webhooks]
      summary: Create webhook subscription
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'

  /webhooks/{webhookId}:
    delete:
      tags: [Webhooks]
      summary: Delete webhook
      operationId: deleteWebhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    ShipmentId:
      name: shipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict (e.g. duplicate idempotency or state)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time

    TokenRequest:
      type: object
      required: [grantType, clientId, clientSecret]
      properties:
        grantType:
          type: string
          enum: [client_credentials]
        clientId:
          type: string
        clientSecret:
          type: string
          format: password

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string

    Address:
      type: object
      required: [line1, city, postalCode, countryCode]
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          example: US

    Party:
      type: object
      required: [name, address]
      properties:
        name:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    Package:
      type: object
      required: [weightKg, quantity]
      properties:
        weightKg:
          type: number
          minimum: 0.01
        lengthCm:
          type: number
        widthCm:
          type: number
        heightCm:
          type: number
        quantity:
          type: integer
          minimum: 1
        description:
          type: string
        hsCode:
          type: string
          description: Harmonized System code for customs

    TransportMode:
      type: string
      enum: [AIR, OCEAN, GROUND, MULTIMODAL]

    ServiceLevel:
      type: string
      enum: [ECONOMY, STANDARD, EXPRESS]

    ShipmentStatus:
      type: string
      enum:
        - DRAFT
        - BOOKED
        - PICKED_UP
        - IN_TRANSIT
        - CUSTOMS
        - OUT_FOR_DELIVERY
        - DELIVERED
        - CANCELLED
        - EXCEPTION

    Shipment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        trackingNumber:
          type: string
          example: NX-4829103
        status:
          $ref: '#/components/schemas/ShipmentStatus'
        mode:
          $ref: '#/components/schemas/TransportMode'
        serviceLevel:
          $ref: '#/components/schemas/ServiceLevel'
        reference:
          type: string
        shipper:
          $ref: '#/components/schemas/Party'
        consignee:
          $ref: '#/components/schemas/Party'
        originHub:
          type: string
        destinationHub:
          type: string
        packages:
          type: array
          items:
            $ref: '#/components/schemas/Package'
        estimatedDeliveryAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateShipmentRequest:
      type: object
      required: [mode, serviceLevel, shipper, consignee, packages]
      properties:
        mode:
          $ref: '#/components/schemas/TransportMode'
        serviceLevel:
          $ref: '#/components/schemas/ServiceLevel'
        reference:
          type: string
        shipper:
          $ref: '#/components/schemas/Party'
        consignee:
          $ref: '#/components/schemas/Party'
        packages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Package'

    UpdateShipmentRequest:
      type: object
      properties:
        reference:
          type: string
        consignee:
          $ref: '#/components/schemas/Party'

    ShipmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Shipment'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    TrackingEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ShipmentStatus'
        description:
          type: string
        location:
          type: string
        occurredAt:
          type: string
          format: date-time

    TrackingResponse:
      type: object
      properties:
        trackingNumber:
          type: string
        status:
          $ref: '#/components/schemas/ShipmentStatus'
        origin:
          type: string
        destination:
          type: string
        estimatedDeliveryAt:
          type: string
          format: date-time
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        events:
          type: array
          items:
            $ref: '#/components/schemas/TrackingEvent'

    QuoteRequest:
      type: object
      required: [mode, originCountryCode, destinationCountryCode, packages]
      properties:
        mode:
          $ref: '#/components/schemas/TransportMode'
        serviceLevel:
          $ref: '#/components/schemas/ServiceLevel'
        originCountryCode:
          type: string
        destinationCountryCode:
          type: string
        originPostalCode:
          type: string
        destinationPostalCode:
          type: string
        packages:
          type: array
          items:
            $ref: '#/components/schemas/Package'

    QuoteOption:
      type: object
      properties:
        optionId:
          type: string
        serviceLevel:
          $ref: '#/components/schemas/ServiceLevel'
        totalAmount:
          type: number
        currency:
          type: string
          example: USD
        transitDays:
          type: integer
        validUntil:
          type: string
          format: date-time

    QuoteResponse:
      type: object
      properties:
        quoteId:
          type: string
          format: uuid
        options:
          type: array
          items:
            $ref: '#/components/schemas/QuoteOption'

    Warehouse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: PVG-01
        name:
          type: string
        type:
          type: string
          enum: [HUB, CROSS_DOCK, BONDED, COLD_CHAIN]
        address:
          $ref: '#/components/schemas/Address'
        capabilities:
          type: array
          items:
            type: string

    DocumentType:
      type: string
      enum: [BOL, COMMERCIAL_INVOICE, PACKING_LIST, CUSTOMS, POD]

    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shipmentId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/DocumentType'
        fileName:
          type: string
        uploadedAt:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum:
              - shipment.created
              - shipment.status_changed
              - shipment.delivered
              - shipment.exception
        secret:
          type: string
          description: HMAC signing secret (shown once on create)
        active:
          type: boolean

    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          items:
            type: string
